{% extends "base.html" %}
{% block content %}
<style>
    body {
        margin: 0;
        padding: 0;
    }
    .login-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: url("{{ url_for('static', filename='img/login_bg.png') }}") no-repeat center center fixed;
        background-size: cover;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        overflow: hidden;
        width: 100%;
        max-width: 440px;
    }
    .login-header {
        background: var(--primary-gradient);
        padding: 45px 20px;
        text-align: center;
        color: white;
        position: relative;
    }
    .login-header::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40px;
        background: linear-gradient(to top, rgba(255,255,255,0.1), transparent);
    }
    .login-body {
        padding: 40px;
    }
    .input-group-text {
        color: #6b7280;
        background-color: #f9fafb;
        border-color: #e5e7eb;
    }
</style>

<div class="login-container">
    <div class="glass-card animate-fade-in">
        <div class="login-header">
            <div class="mx-auto mb-3 border-2 border-white border-opacity-50" style="width: 75px; height: 75px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1);">
                <i class="fas fa-university fa-2x"></i>
            </div>
            <h3 class="fw-bold mb-1 letter-spacing-1">VIDYA PORTAL</h3>
            <p class="mb-0 small text-white text-opacity-75 uppercase fw-medium">Academic Management System</p>
        </div>
        <div class="login-body">
            <form method="POST" autocomplete="off">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary uppercase mb-2">Identification ID</label>
                    <div class="input-group shadow-sm rounded-8">
                        <span class="input-group-text border-end-0"><i class="fas fa-id-card"></i></span>
                        <input type="text" name="username" class="form-control border-start-0" required
                            placeholder="Admission ID or Admin" autocomplete="off" value="">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary uppercase mb-2">Password</label>
                    <div class="input-group shadow-sm rounded-8">
                        <span class="input-group-text border-end-0"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" required 
                            placeholder="Security Key" autocomplete="new-password" value="">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow hover-up mt-2">
                    Access Portal <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
            
            <div class="mt-5 text-center px-4">
                <p class="small text-muted opacity-75 mb-0">Authorized personnel only. Please maintain credential confidentiality.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
