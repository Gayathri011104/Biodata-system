{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-user-graduate fa-3x text-primary"></i>
                    <h3 class="mt-3">Academic Login</h3>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Register Number / Username</label>
                        <input type="text" name="username" class="form-control" required
                            placeholder="e.g. TL23BTCS0010 or admin">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required placeholder="password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Login to Portal</button>
                </form>
                <div class="mt-4 text-center text-muted small">
                    Teacher Creds: admin / admin123<br>
                    Student Creds: TL23BTCS0010 / student123
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
