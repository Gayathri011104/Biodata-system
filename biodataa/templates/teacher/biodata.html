{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Student Biodata Repository</h2>
</div>

<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Admission No</th>
                    <th>Univ No</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr>
                    <td>{{ s.reg_no }}</td>
                    <td>{{ s.univ_no or 'N/A' }}</td>
                    <td>{{ s.name }}</td>
                    <td>{{ s.email }}</td>
                    <td>{{ s.phone or 'N/A' }}</td>
                    <td>
                        <div class="btn-group">
                            <a href="{{ url_for('student_detail', id=s.id) }}" class="btn btn-sm btn-outline-primary">Open Biodata</a>
                            <form action="{{ url_for('delete_student', id=s.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this student profile and all associated records?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
