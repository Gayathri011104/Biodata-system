{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Teacher Dashboard</h2>
    <div class="d-flex align-items-center bg-white p-2 px-3 rounded shadow-sm border">
        <label class="me-3 fw-bold text-muted small">SELECT SEMESTER</label>
        <form id="semForm" action="{{ url_for('dashboard') }}" method="GET">
            <select name="semester" class="form-select border-0 bg-light fw-bold text-primary" style="min-width: 180px; cursor: pointer;" onchange="this.form.submit()">
                {% for i in range(1, 9) %}
                {% set sem_val = 'S' ~ i %}
                <option value="{{ sem_val }}" {% if current_sem == sem_val %}selected{% endif %}>Semester {{ i }}</option>
                {% endfor %}
            </select>
        </form>
    </div>
</div>

<div class="row">
    {% for item in data %}
    <div class="col-md-4 mb-4">
        <div class="card shadow-sm h-100 academic-card">
            <div class="card-body">
                <h5 class="card-title mb-1">{{ item.profile.name }}</h5>
                <h6 class="card-subtitle mb-3 text-muted small">{{ item.profile.reg_no }}</h6>
                
                <hr>
                
                <div class="row mt-3">
                    <div class="col-6 border-end">
                        <label class="small text-muted d-block">University No</label>
                        <span class="fw-bold">{{ item.profile.univ_no or 'N/A' }}</span>
                    </div>
                    <div class="col-6 ps-3">
                        <label class="small text-muted d-block" title="Shows the most recently assigned CGPA across all semesters">Current CGPA</label>
                        <span class="h5 mb-0 fw-bold text-success">{{ item.latest_cgpa or 'N/A' }}</span>
                    </div>
                </div>
            </div>
            <div class="card-footer bg-white border-0 pb-3">
                <a href="{{ url_for('student_detail', id=item.profile.id) }}"
                    class="btn btn-sm btn-outline-primary w-100">View Detailed Biodata</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
